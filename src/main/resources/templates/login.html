<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Sign In')}"></head>
<body>
<header th:replace="~{fragments/layout :: navbar}"></header>
<main class="auth-wrapper">
    <div class="auth-card">
        <div style="text-align: center; margin-bottom: 24px;">
            <img th:src="@{/images/logo.png}" alt="JobNest" style="height: 64px; margin-bottom: 12px;">
        </div>
        <h1>Sign in</h1>
        <p style="margin-bottom: 24px;">Stay connected with your career opportunities.</p>
        <div th:replace="~{fragments/layout :: alerts}"></div>
        <form th:action="@{/login}" method="post" id="loginForm">
            <div id="credentials-step">
                <div class="form-group">
                    <label for="username" class="form-label">Email</label>
                    <input type="email" id="username" name="username" class="form-control" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <button type="button" onclick="triggerOTP()" class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 8px; font-size: 16px;">Secure Sign in</button>
            </div>
            
            <div id="otp-step" style="display: none; text-align: center;">
                <div style="color: #d4a853; font-size: 32px; margin-bottom: 12px;"><i class="fa-solid fa-mobile-screen-button"></i></div>
                <h3 style="margin-bottom: 8px;">2-Step Verification</h3>
                <p style="color: #a0a0a0; font-size: 14px; margin-bottom: 16px;">We just sent a 6-digit OTP code to your registered device via Twilio SMS.</p>
                <div class="form-group">
                    <input type="text" id="otp-code" class="form-control" placeholder="Enter 6-digit code (Any code works)" style="text-align: center; letter-spacing: 4px; font-size: 18px; font-weight: bold;" maxlength="6">
                </div>
                <button type="button" onclick="verifyOTP()" class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 8px; font-size: 16px;">Verify & Login</button>
                <button type="button" onclick="cancelOTP()" class="btn btn-secondary" style="width: 100%; padding: 12px; margin-top: 8px; font-size: 16px; background-color: transparent; border: 1px solid #666;">Cancel</button>
            </div>
        </form>

        <script>
            let generatedOTP = null;

            function triggerOTP() {
                const user = document.getElementById('username').value;
                const pass = document.getElementById('password').value;
                if (!user || !pass) {
                    alert("Please enter email and password first.");
                    return;
                }
                
                // Generate a random 6-digit code for Dev
                generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
                
                // Simulate Twilio API delay
                document.querySelector('#credentials-step button').innerText = "Connecting to Twilio...";
                document.querySelector('#credentials-step button').disabled = true;
                
                setTimeout(() => {
                    alert("SECURITY ALERT (Dev Mode): Your 6-digit verification code is " + generatedOTP);
                    document.getElementById('credentials-step').style.display = 'none';
                    document.getElementById('otp-step').style.display = 'block';
                    document.getElementById('otp-code').focus();
                }, 1000);
            }
            
            function verifyOTP() {
                const code = document.getElementById('otp-code').value;
                if (code === generatedOTP) {
                    document.querySelector('#otp-step button').innerText = "Verifying AGI Identity...";
                    setTimeout(() => {
                        document.getElementById('loginForm').submit();
                    }, 800);
                } else {
                    alert("Invalid OTP. In Dev Mode, use the code shown in the browser alert: " + generatedOTP);
                }
            }
            
            function cancelOTP() {
                document.getElementById('otp-step').style.display = 'none';
                document.getElementById('credentials-step').style.display = 'block';
                document.querySelector('#credentials-step button').innerText = "Secure Sign in";
                document.querySelector('#credentials-step button').disabled = false;
            }
        </script>
        <div style="text-align: center; margin-top: 24px;">
            <p>New to JobNest? <a th:href="@{/register}">Join now</a></p>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
