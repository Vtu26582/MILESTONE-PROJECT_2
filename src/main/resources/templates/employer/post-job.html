<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${job.id == null ? 'Post New Job' : 'Edit Job'})}"></head>
<body>
<header th:replace="~{fragments/layout :: navbar}"></header>

<main class="container dashboard-layout">
    <div class="dashboard-sidebar">
        <nav th:replace="~{fragments/layout :: employer-sidebar(${job.id == null ? 'post-job' : 'dashboard'})}"></nav>
    </div>
    
    <div class="dashboard-main">
        <h1 style="font-size: 1.75rem; margin-bottom: 1.5rem;" th:text="${job.id == null ? 'Post New Job' : 'Edit Job Listings'}">Job Form</h1>
        
        <div class="card">
            <div class="card-body">
                <form th:action="${job.id == null ? '/employer/jobs/new' : '/employer/jobs/' + job.id + '/edit'}" th:object="${job}" method="post">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label for="title">Job Title *</label>
                            <input type="text" id="title" th:field="*{title}" class="form-control" required>
        					<div class="text-danger" th:if="${#fields.hasErrors('title')}" th:errors="*{title}" style="color: var(--error-color); font-size: 0.875rem;"></div>
                        </div>
                        <div class="form-group">
                            <label for="company">Company Name *</label>
                            <input type="text" id="company" th:field="*{company}" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="location">Location *</label>
                            <input type="text" id="location" th:field="*{location}" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="category">Category *</label>
                            <select id="category" th:field="*{category}" class="form-control" required>
                                <option value="Software Development">Software Development</option>
                                <option value="Design & UI/UX">Design & UI/UX</option>
                                <option value="Marketing">Marketing</option>
                                <option value="Sales">Sales</option>
                                <option value="Customer Support">Customer Support</option>
                                <option value="Finance">Finance</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="salaryMin">Minimum Salary (Optional)</label>
                            <input type="number" id="salaryMin" th:field="*{salaryMin}" class="form-control">
                        </div>
                        <div class="form-group">
                            <label for="salaryMax">Maximum Salary (Optional)</label>
                            <input type="number" id="salaryMax" th:field="*{salaryMax}" class="form-control">
                        </div>
                        <div class="form-group">
                            <label for="experienceLevel">Experience Level</label>
                            <select id="experienceLevel" th:field="*{experienceLevel}" class="form-control">
                                <option value="Entry Level">Entry Level</option>
                                <option value="Mid-level (3+ years)">Mid-level</option>
                                <option value="Senior (5+ years)">Senior</option>
                                <option value="Director/Executive">Executive</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="status">Job Status</label>
                            <select id="status" th:field="*{status}" class="form-control">
                                <option value="ACTIVE">Active (Visible)</option>
                                <option value="DRAFT">Draft (Hidden)</option>
                                <option value="CLOSED">Closed</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="description">Job Description *</label>
                        <textarea id="description" th:field="*{description}" class="form-control" rows="6" required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="skillsRequired">Required Skills</label>
                        <textarea id="skillsRequired" th:field="*{skillsRequired}" class="form-control" rows="3"></textarea>
                    </div>
                    
                    <div class="form-group" style="margin-top: 2rem;">
                        <button type="submit" class="btn btn-primary btn-lg" th:text="${job.id == null ? 'Publish Job' : 'Save Changes'}">Submit</button>
                        <a th:href="@{/employer/dashboard}" class="btn btn-outline btn-lg">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body></html>
