<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Applicants')}"></head>
<body>
<header th:replace="~{fragments/layout :: navbar}"></header>

<main class="container dashboard-layout">
    <div class="dashboard-sidebar">
        <nav th:replace="~{fragments/layout :: employer-sidebar('dashboard')}"></nav>
    </div>
    
    <div class="dashboard-main">
        <div style="margin-bottom: 1.5rem;">
            <a th:href="@{/employer/dashboard}" style="color: var(--text-muted);"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
            <h1 style="font-size: 1.75rem; margin-top: 0.5rem;">Applicants for: <span th:text="${job.title}">Job</span></h1>
        </div>
        
        <div th:replace="~{fragments/layout :: alerts}"></div>
        
        <div class="card table-responsive">
            <div style="padding: 1rem; border-bottom: 1px solid var(--border-color);">
                <input type="text" data-filter-table="applicantsTable" class="form-control" placeholder="Search applicants..." style="max-width: 300px;">
            </div>
            <table class="table" id="applicantsTable">
                <thead><tr><th>Applicant Name</th><th>Email</th><th>Applied On</th><th>AI Fit Score</th><th>Resume</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody>
                    <tr th:each="app : ${applications}">
                        <td th:text="${app.user.fullName}">Name</td>
                        <td><a th:href="'mailto:' + ${app.user.email}" th:text="${app.user.email}">Email</a></td>
                        <td th:text="${#temporals.format(app.appliedAt, 'MMM dd, yyyy')}">Date</td>
                        <td>
                            <span style="background-color: rgba(212, 168, 83, 0.2); color: var(--primary-color); padding: 4px 8px; border-radius: 4px; font-weight: bold; border: 1px solid var(--primary-color);" 
                                  th:text="${app.agiFitScore != null ? app.agiFitScore + '%' : 'N/A'}">85%</span>
                        </td>
                        <td>
                            <a th:if="${app.user.resumePath != null}" th:href="@{/uploads/{path}(path=${app.user.resumePath})}" target="_blank" class="btn btn-outline btn-sm"><i class="fa-solid fa-file-pdf text-danger"></i> View</a>
                            <span th:if="${app.user.resumePath == null}" class="text-muted">No resume</span>
                        </td>
                        <td><span th:class="'badge badge-' + ${#strings.toLowerCase(app.status.name())}" th:text="${app.status.name()}">STATUS</span></td>
                        <td style="display: flex; gap: 8px;">
                            <form th:if="${app.status.name() == 'PENDING'}" th:action="@{/employer/applications/{id}/status(id=${app.id})}" method="post">
                                <input type="hidden" name="jobId" th:value="${job.id}">
                                <input type="hidden" name="status" value="ACCEPTED">
                                <button type="submit" style="background-color: #0f9d58; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: 500;">Accept</button>
                            </form>
                            <form th:if="${app.status.name() == 'PENDING'}" th:action="@{/employer/applications/{id}/status(id=${app.id})}" method="post">
                                <input type="hidden" name="jobId" th:value="${job.id}">
                                <input type="hidden" name="status" value="REJECTED">
                                <button type="submit" style="background-color: #d23f31; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: 500;">Reject</button>
                            </form>
                            <span th:if="${app.status.name() != 'PENDING'}" style="color: #666; font-style: italic;">Processed via AGI</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(applications)}">
                        <td colspan="7" style="text-align: center; padding: 2rem;">No applications received yet.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body></html>
