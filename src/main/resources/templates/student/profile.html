<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Profile')}"></head>
<body>
<header th:replace="~{fragments/layout :: navbar}"></header>
<main class="container dashboard-layout">
    <div><nav th:replace="~{fragments/layout :: student-sidebar('profile')}"></nav></div>
    <div>
        <div th:replace="~{fragments/layout :: alerts}"></div>
        
        <div class="card" style="margin-bottom: 16px;">
            <div class="card-header"><h2 style="font-size: 16px; margin: 0;">Resume</h2></div>
            <div class="card-body">
                <div th:if="${user.resumePath != null}" class="alert alert-success" style="margin-bottom: 16px;">
                    <i class="fa-solid fa-file-pdf"></i> Resume uploaded: <a th:href="@{/uploads/{path}(path=${user.resumePath})}" target="_blank" style="color: inherit; text-decoration: underline;">View file</a>
                </div>
                <form th:action="@{/student/upload-resume}" method="post" enctype="multipart/form-data" style="display: flex; gap: 12px; align-items: flex-end;">
                    <div style="flex: 1;">
                        <label for="file" class="form-label">Upload resume (PDF, max 5MB)</label>
                        <input type="file" id="file" name="file" class="form-control" accept=".pdf" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm">Upload</button>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><h2 style="font-size: 16px; margin: 0;">Personal information</h2></div>
            <div class="card-body">
                <form th:action="@{/student/profile}" th:object="${user}" method="post">
                    <div class="form-group">
                        <label for="fullName" class="form-label">Full name</label>
                        <input type="text" id="fullName" th:field="*{fullName}" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" th:field="*{email}" class="form-control" readonly style="background: #f3f2ef; cursor: not-allowed;">
                    </div>
                    <div class="form-group">
                        <label for="phone" class="form-label">Phone</label>
                        <input type="text" id="phone" th:field="*{phone}" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="location" class="form-label">Location</label>
                        <input type="text" id="location" th:field="*{location}" class="form-control" placeholder="City, State">
                    </div>
                    <div class="form-group">
                        <label for="skills" class="form-label">Skills</label>
                        <textarea id="skills" th:field="*{skills}" class="form-control" rows="3" placeholder="Java, Python, Communication..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Save</button>
                </form>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body></html>
