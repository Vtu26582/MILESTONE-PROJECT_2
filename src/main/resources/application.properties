spring.application.name=jobportal

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/jobportal?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=charan123

# Hibernate ORM setup for MySQL 
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Create schema automatically based on models
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# File Upload properties
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=uploads

# Thymeleaf caching (disable for dev)
spring.thymeleaf.cache=false
